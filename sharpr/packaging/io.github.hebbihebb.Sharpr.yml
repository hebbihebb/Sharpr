app-id: io.github.hebbihebb.Sharpr
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: sharpr
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-pictures
  # File chooser portal
  - --talk-name=org.freedesktop.portal.FileChooser

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/sharpr/cargo

modules:
  - name: exiv2
    buildsystem: cmake-ninja
    config-opts:
      - -DEXIV2_BUILD_SAMPLES=OFF
      - -DEXIV2_BUILD_UNIT_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/Exiv2/exiv2/archive/refs/tags/v0.28.3.tar.gz
        sha256: f781896798a72879555627f678ef45b3765e90538a798547477ba662ce2f0365

  - name: gexiv2
    buildsystem: meson
    config-opts:
      - -Dintrospection=false
      - -Dvapi=false
      - -Dpython3=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gexiv2/0.14/gexiv2-0.14.3.tar.xz
        sha256: 62240b952a12902974f07a1262d04a43b2326ec5a62d85b1912448ca6a254cfc

  # -------------------------------------------------------------------------
  # Optional module: realesrgan-ncnn-vulkan
  # -------------------------------------------------------------------------
  # This module is included for AI-based upscaling.
  # If you don't need it, you can remove or comment it out.
  - name: realesrgan-ncnn-vulkan
    buildsystem: simple
    build-commands:
      - install -Dm755 realesrgan-ncnn-vulkan /app/bin/realesrgan-ncnn-vulkan
      - mkdir -p /app/bin/models/
      - cp -r models/* /app/bin/models/
    sources:
      - type: archive
        url: https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan/releases/download/v0.2.0/realesrgan-ncnn-vulkan-20220424-ubuntu.zip
        sha256: 7d6438f615f3ec52857e466657924403197287383a18a51372d67d745499252a

  - name: sharpr
    buildsystem: cargo
    sources:
      - type: dir
        path: ..
      # Note: Run 'flatpak-cargo-generator.py ../Cargo.lock -o cargo-sources.json'
      # and ensure cargo-sources.json is present here before building.
      - type: file
        path: cargo-sources.json
    build-commands:
      - install -Dm644 data/io.github.hebbihebb.Sharpr.desktop /app/share/applications/io.github.hebbihebb.Sharpr.desktop
      - install -Dm644 data/io.github.hebbihebb.Sharpr.metainfo.xml /app/share/metainfo/io.github.hebbihebb.Sharpr.metainfo.xml
      - install -Dm644 data/io.github.hebbihebb.Sharpr.gschema.xml /app/share/glib-2.0/schemas/io.github.hebbihebb.Sharpr.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
      # The cargo buildsystem handles the binary compilation and installation automatically.
