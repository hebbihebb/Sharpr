# Flatpak manifest for Sharpr — Phase 6 skeleton.
# Fill in source URLs and checksums when ready to package.

app-id: com.example.Sharpr
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: sharpr

finish-args:
  # GPU access for GTK4 renderer and NCNN Vulkan upscaler.
  - --device=dri
  # Shared memory for NCNN subprocess buffer sharing.
  - --share=ipc
  # Network: not required for core function; remove if privacy is a concern.
  # - --share=network
  # Default photo library access.
  - --filesystem=xdg-pictures
  # File chooser portal (automatic with GtkFileDialog).
  - --talk-name=org.freedesktop.portal.FileChooser
  # Wayland + X11 display.
  - --socket=wayland
  - --socket=fallback-x11

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/sharpr/cargo

modules:
  # gexiv2 is included in org.gnome.Platform 47, so no need to build it.

  # -------------------------------------------------------------------------
  # realesrgan-ncnn-vulkan (Phase 6: fill in real source)
  # -------------------------------------------------------------------------
  # - name: realesrgan-ncnn-vulkan
  #   buildsystem: simple
  #   build-commands:
  #     - install -Dm755 realesrgan-ncnn-vulkan /app/bin/realesrgan-ncnn-vulkan
  #     - install -Dm644 models/* /app/share/realesrgan/models/
  #   sources:
  #     - type: archive
  #       url: https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan/releases/download/v0.2.0/realesrgan-ncnn-vulkan-20220424-ubuntu.zip
  #       sha256: FILL_IN_CHECKSUM

  # -------------------------------------------------------------------------
  # Sharpr itself
  # -------------------------------------------------------------------------
  - name: sharpr
    buildsystem: simple
    build-commands:
      - cargo build --release --target x86_64-unknown-linux-gnu
      - install -Dm755 target/x86_64-unknown-linux-gnu/release/sharpr /app/bin/sharpr
      - install -Dm644 data/com.example.Sharpr.desktop /app/share/applications/com.example.Sharpr.desktop
      - install -Dm644 data/com.example.Sharpr.metainfo.xml /app/share/metainfo/com.example.Sharpr.metainfo.xml
      # Compile GSettings schema
      - install -Dm644 data/com.example.Sharpr.gschema.xml /app/share/glib-2.0/schemas/com.example.Sharpr.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
    sources:
      - type: dir
        path: ..
